<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mar del Plata Golf Club | Totem Premium Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-950: #081220;
      --navy-900: #0d1a2b;
      --navy-850: #122238;
      --navy-800: #152843;
      --charcoal-900: #101418;
      --charcoal-800: #171d23;
      --charcoal-700: #27303a;
      --bone-100: #f7f2e8;
      --bone-200: #ebe3d3;
      --bone-300: #d8cebc;
      --gold-500: #c2a35a;
      --gold-400: #d5bc83;
      --gold-300: #e8d7ad;
      --green-500: #547a5a;
      --green-400: #739579;
      --red-500: #9c4c4c;
      --shadow-soft: 0 22px 60px rgba(0, 0, 0, 0.34);
      --shadow-card: 0 18px 44px rgba(0, 0, 0, 0.24);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --border-soft: 1px solid rgba(232, 215, 173, 0.16);
      --border-strong: 1px solid rgba(232, 215, 173, 0.28);
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans: "Inter", "Segoe UI", sans-serif;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-sans);
      background:
        radial-gradient(circle at top, rgba(213, 188, 131, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(84, 122, 90, 0.18), transparent 24%),
        linear-gradient(140deg, #07111d 0%, #0a1626 35%, #111b29 100%);
      color: var(--bone-100);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      filter: blur(30px);
      opacity: 0.6;
    }

    body::before {
      top: -14vh;
      left: -8vw;
      width: 28vw;
      height: 28vw;
      background: rgba(194, 163, 90, 0.16);
    }

    body::after {
      right: -10vw;
      bottom: -12vh;
      width: 34vw;
      height: 34vw;
      background: rgba(84, 122, 90, 0.14);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .device {
      position: relative;
      width: min(94vw, calc(94vh * 9 / 16));
      aspect-ratio: 9 / 16;
      border-radius: 42px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%),
        linear-gradient(180deg, rgba(8, 18, 32, 0.96), rgba(16, 20, 24, 0.97));
      border: 1px solid rgba(232, 215, 173, 0.16);
      box-shadow:
        0 40px 140px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      isolation: isolate;
    }

    .device::before,
    .device::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .device::before {
      background:
        linear-gradient(135deg, rgba(232, 215, 173, 0.08), transparent 16%),
        radial-gradient(circle at 20% 16%, rgba(232, 215, 173, 0.1), transparent 14%),
        radial-gradient(circle at 88% 76%, rgba(84, 122, 90, 0.1), transparent 18%);
    }

    .device::after {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.16;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.8) 28%, rgba(0, 0, 0, 0.9));
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 24px 28px 18px;
      border-bottom: 1px solid rgba(232, 215, 173, 0.12);
      background: linear-gradient(180deg, rgba(8, 18, 32, 0.84), rgba(8, 18, 32, 0.62));
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand--hero {
      flex-direction: column;
      align-items: flex-start;
      gap: 18px;
    }

    .crest {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      color: var(--gold-400);
      filter: drop-shadow(0 8px 18px rgba(194, 163, 90, 0.18));
    }

    .brand--hero .crest {
      width: 124px;
      height: 124px;
    }

    .brand__eyebrow {
      font-size: 11px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--bone-300);
      opacity: 0.8;
    }

    .brand__title {
      font-family: var(--font-serif);
      font-size: 30px;
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--bone-100);
    }

    .brand--hero .brand__title {
      font-size: clamp(48px, 5.3vw, 72px);
    }

    .brand__subtitle {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.72);
      margin-top: 4px;
    }

    .brand--hero .brand__subtitle {
      font-size: 15px;
      letter-spacing: 0.28em;
    }

    .topbar__actions {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .screen-root {
      position: relative;
      z-index: 1;
      height: calc(100% - 108px);
      overflow: auto;
      padding: 26px 22px 28px;
      scrollbar-width: thin;
      scrollbar-color: rgba(194, 163, 90, 0.34) transparent;
    }

    .screen-root::-webkit-scrollbar {
      width: 8px;
    }

    .screen-root::-webkit-scrollbar-thumb {
      background: rgba(194, 163, 90, 0.26);
      border-radius: 999px;
    }

    .screen {
      display: grid;
      gap: 20px;
      min-height: 100%;
      animation: fadeSlide 260ms ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .screen__hero {
      position: relative;
      padding: 28px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(145deg, rgba(20, 37, 58, 0.92), rgba(12, 20, 31, 0.95)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
      border: var(--border-soft);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .screen__hero::before {
      content: "";
      position: absolute;
      inset: -20% -8% auto auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(194, 163, 90, 0.16), transparent 68%);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold-300);
      margin-bottom: 8px;
    }

    .hero-title,
    .section-title,
    .panel-title,
    .metric-value,
    .status-value {
      font-family: var(--font-serif);
    }

    .hero-title {
      font-size: clamp(36px, 4.4vw, 58px);
      line-height: 0.95;
      margin: 0 0 10px;
      color: var(--bone-100);
    }

    .hero-copy,
    .section-copy {
      margin: 0;
      color: rgba(247, 242, 232, 0.78);
      line-height: 1.55;
      font-size: 15px;
    }

    .hero-stack {
      display: grid;
      gap: 22px;
      align-items: end;
    }

    .hero-chip-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip,
    .top-pill,
    .status-chip,
    .mini-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border: 1px solid rgba(232, 215, 173, 0.16);
      color: var(--bone-100);
      background: rgba(255, 255, 255, 0.04);
    }

    .top-pill--demo {
      background: rgba(194, 163, 90, 0.14);
      border-color: rgba(194, 163, 90, 0.28);
      color: var(--gold-300);
    }

    .top-pill--clock {
      min-width: 90px;
      justify-content: center;
    }

    .top-pill--quiet {
      color: rgba(247, 242, 232, 0.72);
    }

    .lang-toggle,
    .ghost-btn,
    .quiet-btn,
    .nav-btn,
    .touch-btn,
    .secondary-btn,
    .tertiary-btn,
    .method-btn,
    .keypad-btn,
    .score-btn {
      transition:
        transform var(--transition),
        background var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        opacity var(--transition);
    }

    .lang-toggle,
    .ghost-btn,
    .quiet-btn,
    .nav-btn {
      min-height: 42px;
      padding: 0 15px;
      border-radius: 999px;
      border: 1px solid rgba(232, 215, 173, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: var(--bone-100);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .lang-toggle:hover,
    .ghost-btn:hover,
    .quiet-btn:hover,
    .nav-btn:hover,
    .touch-btn:hover,
    .secondary-btn:hover,
    .tertiary-btn:hover,
    .method-btn:hover,
    .keypad-btn:hover,
    .score-btn:hover {
      transform: translateY(-1px);
    }

    .lang-toggle.is-active,
    .ghost-btn.is-active,
    .nav-btn.is-active,
    .method-btn.is-active,
    .touch-btn.is-active,
    .score-btn.is-active {
      background: linear-gradient(180deg, rgba(194, 163, 90, 0.24), rgba(194, 163, 90, 0.12));
      border-color: rgba(194, 163, 90, 0.42);
      color: var(--gold-300);
      box-shadow: 0 10px 22px rgba(194, 163, 90, 0.14);
    }

    .nav-cluster {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .card-grid {
      display: grid;
      gap: 16px;
    }

    .card-grid--home {
      grid-template-columns: 1fr;
    }

    .primary-card {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 22px 22px 24px;
      border-radius: 30px;
      background:
        linear-gradient(160deg, rgba(18, 34, 56, 0.92), rgba(12, 20, 31, 0.92)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
      border: var(--border-soft);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .primary-card::before {
      content: "";
      position: absolute;
      inset: auto -60px -80px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(194, 163, 90, 0.14), transparent 70%);
    }

    .primary-card__icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      font-size: 26px;
      background: linear-gradient(180deg, rgba(194, 163, 90, 0.16), rgba(255, 255, 255, 0.04));
      border: 1px solid rgba(194, 163, 90, 0.28);
      color: var(--gold-300);
    }

    .primary-card__title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 34px;
      color: var(--bone-100);
      letter-spacing: 0.02em;
    }

    .primary-card__copy {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(247, 242, 232, 0.78);
      max-width: 48ch;
    }

    .card-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }

    .touch-btn,
    .secondary-btn,
    .tertiary-btn,
    .method-btn {
      min-height: 52px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .touch-btn {
      background: linear-gradient(180deg, var(--gold-400), var(--gold-500));
      color: var(--navy-950);
      box-shadow: 0 16px 30px rgba(194, 163, 90, 0.18);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.04);
      color: var(--bone-100);
      border-color: rgba(232, 215, 173, 0.18);
    }

    .tertiary-btn {
      background: rgba(84, 122, 90, 0.12);
      color: #dce7dd;
      border-color: rgba(115, 149, 121, 0.28);
    }

    .touch-btn:disabled,
    .secondary-btn:disabled,
    .tertiary-btn:disabled,
    .method-btn:disabled,
    .keypad-btn:disabled {
      opacity: 0.44;
      cursor: not-allowed;
      transform: none;
    }
    .meta-line {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.62);
    }

    .grid-2,
    .grid-3,
    .grid-4 {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel {
      position: relative;
      padding: 22px;
      border-radius: var(--radius-lg);
      border: var(--border-soft);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent),
        rgba(11, 19, 31, 0.76);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .panel--deep {
      background:
        linear-gradient(180deg, rgba(194, 163, 90, 0.05), transparent),
        linear-gradient(180deg, rgba(10, 17, 29, 0.96), rgba(11, 19, 31, 0.94));
    }

    .panel--accent::before,
    .panel--deep::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(194, 163, 90, 0.48), transparent);
      opacity: 0.8;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 31px;
      color: var(--bone-100);
    }

    .panel-subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(247, 242, 232, 0.76);
    }

    .profile-card {
      display: grid;
      gap: 20px;
      align-items: start;
    }

    .profile-hero {
      display: flex;
      gap: 16px;
      align-items: center;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(232, 215, 173, 0.12);
    }

    .profile-avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at top, rgba(194, 163, 90, 0.32), rgba(194, 163, 90, 0.1)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(194, 163, 90, 0.3);
      color: var(--gold-300);
      font-family: var(--font-serif);
      font-size: 34px;
      box-shadow: 0 12px 28px rgba(194, 163, 90, 0.12);
    }

    .profile-name {
      margin: 0 0 4px;
      font-family: var(--font-serif);
      font-size: 38px;
      line-height: 0.95;
    }

    .profile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(232, 215, 173, 0.1);
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.58);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1;
      color: var(--bone-100);
    }

    .stat-value--gold {
      color: var(--gold-300);
    }

    .stat-value--green {
      color: #d1e3d3;
    }

    .stat-value--red {
      color: #f1c3c3;
    }

    .utility-actions {
      display: grid;
      gap: 14px;
    }

    .utility-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent),
        rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(232, 215, 173, 0.12);
    }

    .utility-card__title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 30px;
    }

    .utility-card__copy {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(247, 242, 232, 0.76);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    .field label {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.62);
    }

    .field input {
      width: 100%;
      min-height: 64px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid rgba(232, 215, 173, 0.16);
      background: rgba(255, 255, 255, 0.04);
      color: var(--bone-100);
      font-size: 18px;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(194, 163, 90, 0.46);
      box-shadow: 0 0 0 4px rgba(194, 163, 90, 0.12);
    }

    .suggestion-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .suggestion-chip {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(232, 215, 173, 0.14);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(247, 242, 232, 0.88);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .keypad-shell {
      display: grid;
      gap: 16px;
    }

    .dni-display {
      min-height: 88px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      border: 1px solid rgba(194, 163, 90, 0.22);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      font-family: var(--font-serif);
      font-size: clamp(34px, 4vw, 50px);
      letter-spacing: 0.18em;
      color: var(--bone-100);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .keypad-btn {
      min-height: 84px;
      border-radius: 22px;
      border: 1px solid rgba(232, 215, 173, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent),
        rgba(255, 255, 255, 0.03);
      color: var(--bone-100);
      font-size: 30px;
      font-family: var(--font-serif);
    }

    .keypad-btn--action {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: var(--font-sans);
    }

    .segment,
    .option-grid,
    .method-grid,
    .quick-grid {
      display: grid;
      gap: 12px;
    }

    .segment {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .option-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .method-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .quick-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice-card,
    .service-card,
    .chart-card,
    .receipt-card,
    .status-card,
    .info-row,
    .score-row {
      border-radius: 20px;
      border: 1px solid rgba(232, 215, 173, 0.12);
      background: rgba(255, 255, 255, 0.03);
    }

    .choice-card,
    .service-card {
      padding: 18px;
      display: grid;
      gap: 8px;
      text-align: left;
    }

    .choice-card.is-active {
      border-color: rgba(194, 163, 90, 0.44);
      background: linear-gradient(180deg, rgba(194, 163, 90, 0.16), rgba(255, 255, 255, 0.03));
      box-shadow: 0 16px 28px rgba(194, 163, 90, 0.12);
    }

    .choice-card__title,
    .service-card__title,
    .receipt-title,
    .chart-card__title {
      margin: 0;
      font-family: var(--font-serif);
      color: var(--bone-100);
    }

    .choice-card__title {
      font-size: 28px;
    }

    .choice-card__copy,
    .service-card__copy,
    .chart-card__copy,
    .receipt-copy {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;

      color: var(--bone-100);

      font-size: 13px;
      line-height: 1.55;
      color: rgba(247, 242, 232, 0.72);
    }

    .chart-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .chart-card {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .chart-card__title {
      font-size: 27px;
    }

    .bar-stack {
      display: grid;
      gap: 10px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: 84px 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: rgba(247, 242, 232, 0.78);
    }

    .bar-track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold-500), var(--gold-300));

    .bar-fill--green {
      background: linear-gradient(90deg, var(--green-500), #9fc0a4);

      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));

      padding: 12px;
      border-radius: 18px;

      border: 1px solid rgba(232, 215, 173, 0.1);

      color: var(--bone-100);
      font-weight: 600;

      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.68);

      display: grid;
      gap: 12px;

      gap: 12px;
      align-items: center;
      padding: 15px 16px;

      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.82);

      color: var(--bone-100);

    .status-value.is-watch {

    }

    .status-value.is-alert {

      height: 100%;

          rgba(8, 18, 32, 0.08) 0,
          rgba(8, 18, 32, 0.08) 2px,

      color: #dce7dd;
    }

    .alert-item__tag.is-watch {
      background: rgba(194, 163, 90, 0.16);
      color: #f0d7b0;
    }

    .alert-item__tag.is-alert {
      background: rgba(156, 76, 76, 0.16);
      color: #f1c3c3;
    }

    .footer-hint {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(247, 242, 232, 0.5);
      padding-bottom: 6px;
    }

    @media (max-width: 860px) {
      .topbar {
        grid-template-columns: 1fr;
        justify-items: stretch;
        gap: 12px;
      }

      .topbar__actions {
        justify-self: stretch;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .grid-2,
      .grid-3,
      .grid-4,
      .chart-grid,
      .manager-grid,
      .option-grid,
      .quick-grid {
        grid-template-columns: 1fr;
      }

      .segment,
      .method-grid,
      .score-selector {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .profile-stats,
      .score-head,
      .score-row {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }

        min-height: 100vh;

        height: 100vh;

        height: 96px;

      .brand__title {
        font-size: 26px;
      }

      .hero-title {
        font-size: 34px;
      }

      .primary-card__title,
      .panel-title,
      .service-card__title,
      .choice-card__title {
        font-size: 28px;
      }

      .profile-name {
        font-size: 32px;
      }

      .summary-value,
      .score-editor__value,
      .metric-value {
        font-size: 34px;
      }

      .keypad-btn {
        min-height: 74px;
      }
    }
  </style>
</head>

      function createDefaultScoreRows() {
        const parMap = [4, 5, 3, 4, 4, 5, 3, 4, 5, 4, 4, 3, 5, 4, 4, 3, 5, 4];
        const ocrMap = [5, 6, 3, 5, 4, 6, 7, 4, 6, 5, 5, 4, 6, 8, 5, 3, 6, 5];
        return parMap.map((par, index) => {
          const hole = index + 1;
          const flagged = hole === 7 || hole === 14;
          const final = hole === 14 ? 6 : ocrMap[index];
          return { hole, par, ocr: ocrMap[index], final, flagged, corrected: hole === 14 };
        });
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat(state.locale === "es" ? "es-AR" : "en-US", {
          style: "currency",
          currency: "ARS",
          maximumFractionDigits: 0
        }).format(value);
      }

      function formatDate(date = new Date()) {
        return new Intl.DateTimeFormat(state.locale === "es" ? "es-AR" : "en-US", {
          day: "2-digit",
          month: "2-digit",

        render();

      function getMemberFromDni(dni) {
        const normalized = String(dni || "").replace(/\D/g, "");
        const base = demoMembers[normalized ? Number(normalized.slice(-1)) % demoMembers.length : 0];
        const handicapOffset = normalized ? (Number(normalized.slice(-2)) % 7) / 10 : 0;
        return { ...base, dni: normalized || "00000000", handicapIndex: Number((base.handicapIndex + handicapOffset).toFixed(1)) };
      }

        const initials = cleanName.split(" ").map(part => part.charAt(0).toUpperCase()).slice(0, 2).join("");

      function getRateTable() {
        return {
          member: { social: { 9: 12000, 18: 18500, 36: 31800 }, tournament: 22000 },
          guest: { social: { 9: 26500, 18: 39200, 36: 68800 }, tournament: 43000 }
        };

      function getTeeMeta(tee) {
        const teeMap = {
          red: { label: t("redTee"), slope: 0.98, audience: t("ladies") },
          yellow: { label: t("yellowTee"), slope: 1.05, audience: t("gentlemen") },
          blue: { label: t("blueTee"), slope: 1.14, audience: t("gentlemen") }
        };
        return teeMap[tee] || teeMap.yellow;
      }

      function computeGreenFee() {
        const profile = getCurrentProfile();
        const baseIndex = profile ? Number(profile.handicapIndex || 18) : 18;
        const rateTable = getRateTable();
        const userType = state.userType === "guest" ? "guest" : "member";
        const teeMeta = getTeeMeta(state.greenFee.tee);
        const playingHandicap = Math.max(0, Math.round(baseIndex * teeMeta.slope));
        const amount = state.greenFee.tournament === true ? rateTable[userType].tournament : rateTable[userType].social[state.greenFee.holes];
        state.greenFee.playingHandicap = playingHandicap;
        state.greenFee.amount = amount || 0;
      }

      function scoreTotals() {
        const totalPar = state.scorecard.rows.reduce((sum, row) => sum + row.par, 0);
        const totalOcr = state.scorecard.rows.reduce((sum, row) => sum + row.ocr, 0);
        const totalFinal = state.scorecard.rows.reduce((sum, row) => sum + row.final, 0);
        const corrected = state.scorecard.rows.filter(row => row.corrected).length;
        const pending = state.scorecard.rows.filter(row => row.flagged && !row.corrected).length;
        return { totalPar, totalOcr, totalFinal, corrected, pending };
      }

      function startScanAnimation() {
        stopScanAnimation();
        clearSyncTimeouts();
        state.scorecard.scanProgress = 0;
        state.scorecard.scanRunning = true;
        state.scorecard.stages = { scanned: false, validated: false, golfistics: false, tournament: false, aag: false };
        state.scorecard.rows = createDefaultScoreRows();
        state.scorecard.selectedHole = 7;
        render();
        scanInterval = window.setInterval(() => {
          state.scorecard.scanProgress = Math.min(100, state.scorecard.scanProgress + 5);
          if (state.scorecard.scanProgress >= 100) {
            stopScanAnimation();
            state.scorecard.stages.scanned = true;
            state.scorecard.stages.validated = scoreTotals().pending === 0;
          }
          render();
        }, 110);
      }

      function stopScanAnimation() {
        if (scanInterval) {
          window.clearInterval(scanInterval);
          scanInterval = null;
        }
        state.scorecard.scanRunning = false;
      }

      function clearSyncTimeouts() {
        syncTimeouts.forEach(timeoutId => window.clearTimeout(timeoutId));
        syncTimeouts = [];
      }

      function syncScorecard() {
        if (scoreTotals().pending > 0) return;
        clearSyncTimeouts();
        state.scorecard.stages.validated = true;
        render();
        syncTimeouts = [
          window.setTimeout(() => { state.scorecard.stages.golfistics = true; render(); }, 450),
          window.setTimeout(() => { state.scorecard.stages.tournament = true; render(); }, 900),
          window.setTimeout(() => { state.scorecard.stages.aag = true; render(); }, 1350)
        ];
      }

      function renderCardUpload() {
        const totals = scoreTotals();
        const selectedRow = state.scorecard.rows.find(row => row.hole === state.scorecard.selectedHole) || state.scorecard.rows[0];
        const stages = [
          { key: "scanned", label: t("cardScanned") },
          { key: "validated", label: t("validationReady") },
          { key: "golfistics", label: t("syncedGolfistics") },
          { key: "tournament", label: t("loadedTournament") },
          { key: "aag", label: t("sentAag") }
        ];
        const syncEnabled = state.scorecard.stages.validated && totals.pending === 0;
        return `
          <section class="screen">
            <section class="screen__hero">
              <div class="eyebrow">${t("cardLabel")}</div>
              <h1 class="hero-title">${t("cardTitle")}</h1>
              <p class="hero-copy">${t("cardCopy")}</p>
            </section>

            <section class="grid-2">
              <article class="panel panel--deep scanner-shell">
                <div class="scanner-card">
                  <div class="scanner-paper"><div class="scanner-line" style="--scan-progress: ${state.scorecard.scanProgress};"></div></div>
                  <div class="scanner-overlay">
                    <div class="scanner-progress">
                      <span>${state.locale === "es" ? "Lectura OCR" : "OCR reading"}</span>
                      <strong>${state.scorecard.scanProgress}%</strong>
                    </div>
                  </div>
                </div>
                <div class="method-grid">
                  <button class="touch-btn" data-action="start-scan">${t("scanCard")}</button>
                  <button class="secondary-btn" data-action="sync-scorecard" ${!syncEnabled ? "disabled" : ""}>${t("syncCard")}</button>
                </div>
                <div class="status-strip">
                  ${stages.map((stage, index) => {
                    const complete = Boolean(state.scorecard.stages[stage.key]);
                    const current = !complete && ((index === 0 && state.scorecard.scanRunning) || (index === 1 && state.scorecard.stages.scanned) || (index === 2 && state.scorecard.stages.validated && !state.scorecard.stages.golfistics) || (index === 3 && state.scorecard.stages.golfistics && !state.scorecard.stages.tournament) || (index === 4 && state.scorecard.stages.tournament && !state.scorecard.stages.aag));
                    return `<div class="status-line ${complete ? "is-complete" : current ? "is-current" : ""}"><span>${escapeHtml(stage.label)}</span><span class="status-indicator ${complete ? "is-complete" : totals.pending > 0 && index === 1 ? "is-alert" : ""}">${complete ? (state.locale === "es" ? "Listo" : "Done") : current ? (state.locale === "es" ? "En curso" : "Running") : (state.locale === "es" ? "Pendiente" : "Pending")}</span></div>`;
                  }).join("")}
                </div>
              </article>

              <aside class="summary-box">
                <div class="summary-main">
                  <div>
                    <div class="summary-label">${t("selectScore")}</div>
                    <div class="summary-value">${totals.totalFinal}</div>
                  </div>
                  <div class="mini-chip">${totals.pending} ${state.locale === "es" ? "pend." : "pending"}</div>
                </div>
                <p class="summary-note">${t("reviewScore")}</p>
                <div class="detail-list">
                  <div class="detail-item"><span>Par</span><strong>${totals.totalPar}</strong></div>
                  <div class="detail-item"><span>OCR</span><strong>${totals.totalOcr}</strong></div>
                  <div class="detail-item"><span>Total final</span><strong>${totals.totalFinal}</strong></div>
                  <div class="detail-item"><span>${t("correctionCount")}</span><strong>${totals.corrected}</strong></div>
                </div>
              </aside>
            </section>

            <section class="grid-2">
              <article class="panel table-shell">
                <div class="eyebrow">${t("touchToEdit")}</div>
                <div class="score-head"><span>Hoyo</span><span>Par</span><span>OCR</span><span>Final</span><span>Estado</span></div>
                <div class="score-table">
                  ${state.scorecard.rows.map(row => `
                    <button class="score-row ${row.flagged && !row.corrected ? "is-flagged" : ""} ${row.hole === state.scorecard.selectedHole ? "is-selected" : ""}" data-action="select-hole" data-hole="${row.hole}">
                      <span>${row.hole}</span>
                      <span>${row.par}</span>
                      <span>${row.ocr}</span>
                      <span>${row.final}</span>
                      <span class="score-row__flag ${row.flagged && !row.corrected ? "is-flagged" : "is-ok"}">${row.flagged && !row.corrected ? t("detectedError") : "OK"}</span>
                    </button>
                  `).join("")}
                </div>
              </article>

              <article class="panel score-editor">
                <div class="score-editor__header">
                  <div><div class="eyebrow">${t("selectScore")}</div><h2 class="panel-title" style="margin-bottom: 0;">Hoyo ${selectedRow.hole}</h2></div>
                  <div class="score-editor__value">${selectedRow.final}</div>
                </div>
                <p class="panel-subtitle">${selectedRow.flagged && !selectedRow.corrected
                  ? (state.locale === "es" ? "El OCR detecto una inconsistencia. Ajusta el score correcto." : "OCR detected an inconsistency. Adjust the correct score.")
                  : (state.locale === "es" ? "Puedes corregir manualmente cualquier score antes de sincronizar." : "You can manually adjust any score before synchronizing.")}</p>
                <div class="score-selector">
                  ${[2,3,4,5,6,7,8,9].map(score => `<button class="score-btn ${selectedRow.final === score ? "is-active" : ""}" data-action="set-hole-score" data-score="${score}">${score}</button>`).join("")}
                </div>
                <div class="detail-list">
                  <div class="detail-item"><span>OCR</span><strong>${selectedRow.ocr}</strong></div>
                  <div class="detail-item"><span>Final</span><strong>${selectedRow.final}</strong></div>
                  <div class="detail-item"><span>Estado</span><strong>${selectedRow.flagged && !selectedRow.corrected ? t("detectedError") : "Validado"}</strong></div>
                </div>
              </article>
            </section>
          </section>
        `;
      }

      function renderDashboard() {
        return `
          <section class="screen">
            <section class="screen__hero">
              <div class="manager-banner">
                <div>
                  <div class="eyebrow">${t("managerPanel")}</div>
                  <h1 class="hero-title">${t("managerTitle")}</h1>
                  <p class="hero-copy">${t("managerCopy")}</p>
                </div>
                <div class="manager-live">${state.locale === "es" ? "En vivo" : "Live"}</div>
              </div>
            </section>

            <section class="manager-grid">
              ${managerData.metrics.map(metric => `<article class="metric-card"><div class="metric-label">${t(metric.labelKey)}</div><div class="metric-value">${metric.value}</div><div class="metric-footnote">${escapeHtml(metric.note)}</div></article>`).join("")}
            </section>

            <section class="chart-grid">
              <article class="chart-card">
                <h2 class="chart-card__title">${t("occupancy")}</h2>
                <p class="chart-card__copy">${state.locale === "es" ? "Picos reales de ocupacion por franja horaria." : "Real occupancy peaks by time window."}</p>
                <div class="bar-stack">
                  ${managerData.occupancy.map(item => `<div class="bar-line"><span>${item.label}</span><div class="bar-track"><div class="bar-fill" style="width:${item.value}%"></div></div><strong>${item.value}%</strong></div>`).join("")}
                </div>
              </article>

              <article class="chart-card">
                <h2 class="chart-card__title">${t("teeUsage")}</h2>
                <p class="chart-card__copy">${state.locale === "es" ? "Distribucion de salidas por tee configurado." : "Starting distribution by configured tee."}</p>
                <div class="bar-stack">
                  ${managerData.teeUsage.map(item => `<div class="bar-line"><span>${item.label}</span><div class="bar-track"><div class="bar-fill ${item.style === "green" ? "bar-fill--green" : ""}" style="width:${item.value}%"></div></div><strong>${item.value}%</strong></div>`).join("")}
                </div>
              </article>

              <article class="chart-card">
                <h2 class="chart-card__title">${t("rounds")}</h2>
                <p class="chart-card__copy">${state.locale === "es" ? "Participacion de formatos utilizados en el dia." : "Participation by round format during the day."}</p>
                <div class="ring-row">
                  ${managerData.rounds.map(item => `<div class="ring-card"><div class="ring" style="--value:${item.value};">${item.value}%</div><div class="ring-label">${item.label}</div></div>`).join("")}
                </div>
              </article>

              <article class="chart-card">
                <h2 class="chart-card__title">${t("participation")}</h2>
                <p class="chart-card__copy">${state.locale === "es" ? "Alcance del flujo de torneos y cierre post ronda." : "Reach of the tournament flow and post round completion."}</p>
                <div class="ring-row">
                  ${managerData.participation.map(item => `<div class="ring-card"><div class="ring" style="--value:${item.value};">${item.value}%</div><div class="ring-label">${item.label}</div></div>`).join("")}
                </div>
              </article>
            </section>

            <section class="grid-2">
              <article class="panel">
                <div class="eyebrow">${t("frequentPlayers")}</div>
                <h2 class="panel-title">${t("frequentPlayers")}</h2>
                <div class="alert-list">
                  ${managerData.frequentPlayers.map(player => `<div class="alert-item"><span>${escapeHtml(player)}</span><span class="alert-item__tag is-ok">Top</span></div>`).join("")}
                </div>
              </article>

              <article class="panel">
                <div class="eyebrow">${t("operationalAlerts")}</div>
                <h2 class="panel-title">${t("operationalStatus")}</h2>
                <div class="alert-list">
                  ${managerData.alerts.map(alert => `<div class="alert-item"><span>${escapeHtml(alert.label)} · ${escapeHtml(alert.value)}</span><span class="alert-item__tag is-${alert.tone}">${escapeHtml(alert.value)}</span></div>`).join("")}
                </div>
              </article>
            </section>
          </section>
        `;
      }

      function renderScreen() {
        switch (state.screen) {
          case "member-login": return renderMemberLogin();
          case "member-panel": return renderProfilePanel({ titleKey: "memberPanelTitle" });
          case "guest-register": return renderGuestRegistration();
          case "guest-panel": return renderProfilePanel({ titleKey: "guestPanelTitle", isGuest: true });
          case "services": return renderServicesHub();
          case "green-fee": return renderGreenFee();
          case "account": return renderAccountStatus();
          case "quota": return renderQuotaPayment();
          case "card-upload": return renderCardUpload();
          case "dashboard": return renderDashboard();
          case "home":
          default:
            return renderHome();
        }
      }

      function render() {
        updateHeader();
        screenRoot.innerHTML = renderScreen();
      }

      function syncGuestFormUI() {
        const confirmGuestBtn = document.getElementById("confirmGuestBtn");
        const guestPreviewName = document.getElementById("guestPreviewName");
        const guestPreviewDni = document.getElementById("guestPreviewDni");
        const isReady = state.guestForm.name.trim().length >= 3 && state.guestForm.dni.trim().length >= 7;
        if (confirmGuestBtn) {
          confirmGuestBtn.disabled = !isReady;
        }
        if (guestPreviewName) {
          guestPreviewName.textContent = state.guestForm.name || demoGuests[0].name;
        }
        if (guestPreviewDni) {
          guestPreviewDni.textContent = state.guestForm.dni || demoGuests[0].dni;
        }
      }

      function updateGuestForm(name, value) {
        state.guestForm[name] = value;
        syncGuestFormUI();
      }

      function confirmMember() {
        if (state.memberDni.length < 7) return;
        state.userType = "member";
        state.activeProfile = getMemberFromDni(state.memberDni);
        state.greenFee.issued = false;
        state.quotaPayment.confirmed = false;
        navigate("member-panel");
      }

      function confirmGuest() {
        if (state.guestForm.name.trim().length < 3 || state.guestForm.dni.trim().length < 7) return;
        state.userType = "guest";
        state.activeProfile = buildGuestProfile(state.guestForm.name, state.guestForm.dni);
        state.greenFee.issued = false;
        navigate("guest-panel");
      }

      function openServices() {
        navigate("services");
      }

      function issueGreenFee() {
        computeGreenFee();
        state.greenFee.issued = true;
        state.greenFee.ticketNumber = `GF-${Date.now().toString().slice(-6)}`;
        if (state.activeProfile) {
          state.activeProfile.course = `Cancha principal · tee ${getTeeMeta(state.greenFee.tee).label}`;
          state.activeProfile.status = state.userType === "guest" ? (state.locale === "es" ? "Green fee emitido" : "Green fee issued") : state.activeProfile.status;
        }
        render();
      }

      function confirmQuotaPayment() {
        state.quotaPayment.confirmed = true;
        if (state.activeProfile) {
          state.activeProfile.status = state.locale === "es" ? "Cuota al dia" : "Membership current";
          state.activeProfile.balance = "$ 0";
        }
        render();
      }

      function selectHole(hole) {
        state.scorecard.selectedHole = Number(hole);
        render();
      }

      function setHoleScore(score) {
        const targetHole = state.scorecard.selectedHole;
        state.scorecard.rows = state.scorecard.rows.map(row => row.hole !== targetHole ? row : { ...row, final: Number(score), corrected: true, flagged: Number(score) !== row.ocr });
        const pending = scoreTotals().pending;
        state.scorecard.stages.validated = pending === 0 && state.scorecard.stages.scanned;
        render();
      }

      function prefillGuest(index) {
        const guest = demoGuests[Number(index)] || demoGuests[0];
        state.guestForm.name = guest.name;
        state.guestForm.dni = guest.dni;
        render();
      }

      function useDemoGuest() {
        prefillGuest(0);
      }

      function setTournamentChoice(value) {
        state.greenFee.tournament = value === "yes";
        if (state.greenFee.tournament) state.greenFee.holes = 18;
        state.greenFee.issued = false;
        computeGreenFee();
        render();
      }

      function setHolesValue(holes) {
        state.greenFee.holes = Number(holes);
        state.greenFee.issued = false;
        computeGreenFee();
        render();
      }

      function setTeeValue(tee) {
        state.greenFee.tee = tee;
        state.greenFee.issued = false;
        computeGreenFee();
        render();
      }

      function setPaymentMethodValue(method) {
        state.greenFee.paymentMethod = method;
        state.greenFee.issued = false;
        render();
      }

      function setQuotaPlan(plan) {
        state.quotaPayment.plan = plan;
        state.quotaPayment.confirmed = false;
        render();
      }

      function setQuotaMethod(method) {
        state.quotaPayment.method = method;
        state.quotaPayment.confirmed = false;
        render();
      }

      function openGolfistics() {
        window.open(GOLFISTICS_URL, "_blank", "noopener,noreferrer");
      }

      function handleClick(event) {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const { action, digit, dni, index, hole, score, value, holes, tee, method, plan } = button.dataset;
        switch (action) {
          case "go-home": goHome(); break;
          case "go-back": goBack(); break;
          case "toggle-language": state.locale = state.locale === "es" ? "en" : "es"; render(); break;
          case "open-members": navigate("member-login"); break;
          case "open-guests": navigate("guest-register"); break;
          case "open-card-upload": navigate("card-upload"); break;
          case "open-dashboard": navigate("dashboard"); break;
          case "add-digit":
            if (state.memberDni.length < 8) { state.memberDni += digit; render(); }
            break;
          case "clear-dni": state.memberDni = ""; render(); break;
          case "fill-dni": state.memberDni = dni; render(); break;
          case "confirm-member": confirmMember(); break;
          case "demo-guest": useDemoGuest(); break;
          case "prefill-guest": prefillGuest(index); break;
          case "confirm-guest": confirmGuest(); break;
          case "open-golfistics": openGolfistics(); break;
          case "open-services": openServices(); break;
          case "open-green-fee": navigate("green-fee"); break;
          case "open-account": navigate("account"); break;
          case "open-quota": navigate("quota"); break;
          case "set-tournament": setTournamentChoice(value); break;
          case "set-holes": setHolesValue(holes); break;
          case "set-tee": setTeeValue(tee); break;
          case "set-payment-method": setPaymentMethodValue(method); break;
          case "issue-green-fee": issueGreenFee(); break;
          case "set-quota-plan": setQuotaPlan(plan); break;
          case "set-quota-method": setQuotaMethod(method); break;
          case "confirm-quota-payment": confirmQuotaPayment(); break;
          case "start-scan": startScanAnimation(); break;
          case "select-hole": selectHole(hole); break;
          case "set-hole-score": setHoleScore(score); break;
          case "sync-scorecard": syncScorecard(); break;
          default: break;
        }
      }

      function handleInput(event) {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.name === "guestName") updateGuestForm("name", target.value);
        if (target.name === "guestDni") updateGuestForm("dni", target.value.replace(/\D/g, "").slice(0, 8));
      }

      document.addEventListener("click", handleClick);
      document.addEventListener("input", handleInput);

      window.addEventListener("beforeunload", () => {
        stopScanAnimation();
        clearSyncTimeouts();
      });

      window.setInterval(setClock, 1000);
      computeGreenFee();
      updateHeader();
      render();
    })();
  </script>
</body>
</html>
